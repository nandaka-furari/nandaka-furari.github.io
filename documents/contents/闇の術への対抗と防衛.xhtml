<h1>闇の術への対抗と防衛について</h1>
<h2>闇の術とは？</h2>
<p>闇っぽくて術っぽいもの。<a href="闇の召喚術.xhtml">これ</a>。対応は<a href="/documents/wesnoth/unit/dementor.xhtml">齟齬</a>と<a href="/documents/wesnoth/unit/ancient dementor.xhtml">古代の齟齬</a>のみ。死の水先人は対応の仕方が分からない。<br/>
召喚を防ぐだけでなく召喚されてしまった齟齬と古代の齟齬を倒す力を持つ策でもある。</p>
<h2>方法</h2>
<p>利益を度外視して金を使う。主に人件費。なぜかというと、齟齬の元を消す、あるいは召喚された齟齬を退治するには高度な人材に大金で依頼するしかないから。</p>
<p>Wesnothをやるべきです</p>
