<main>
<h1>政治的立場</h1>
<p>自分の政治的立場を整理</p>
<h2>靖国</h2>
<p>首相が靖国神社に参拝する必要はない</p>
<h2>WW2</h2>
<p>日本は侵略国としてふるまった。満州事変、日中戦争も侵略戦争である。</p>
<h2>自衛隊</h2>
<p>戦力であり必要性があるがその存在は違憲状態であって整合性を保たなくてはならない。</p>
<h2>憲法</h2>
<p>自衛隊の存在を認める最低限の憲法改正が必要であるが、自民党による改憲は反対。それ以外は変える必要はない。</p>
<h2>歴史教科書</h2>
<p>単なる事実の羅列に努めようとしただけであって、自虐的であったことはない。</p>
