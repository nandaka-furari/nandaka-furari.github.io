    		<h2>Bitamonbileto</h2>
            <p>Bitcoinから着想を得て、そこに投機的要素を排除し、純粋に世界中の人が国境をまたがってさまさまなサービスや製品―物質的であれデジタル的なものであれ―を簡単に買えるようにするものです。</p>
            <ul>
                <li>一人が持てる量には限度を設ける</li>
                <li>発行は限度が無い</li>
                <li>信頼性を高める</li>
                <li>投機性をなるべく低め、価格変動が鈍くなるようにする</li>
            </ul>
            <h2>Bitcoin</h2>
            <p>Bitcoinは金のような実際に貨幣として使われている貴金属をモデルにしているといえる。</p>
    	</main>
